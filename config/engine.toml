[engine]
mode = "paper"
feature_window_size = 1000
inference_timeout_ms = 3

[gate]
enabled = true
min_edge_bps = 5.0
min_confidence = 0.5
max_hold_s = 30.0
max_spread_bps = 10.0

[risk]
max_notional_per_symbol = 100000.0
max_total_notional = 500000.0
max_leverage = 3.0
max_loss_per_day = 10000.0
max_position_concentration = 0.25

[universe]
enabled = false
crypto_count = 30
equity_count = 20
top_selection_crypto = 7
top_selection_equity = 3
rebuild_interval_mins = 120
refresh_interval_mins = 15
min_volume_usd = 1000000.0
min_liquidity_usd = 500000.0

[s3]
enabled = false
bucket = "hft-training-data"
region = "us-east-1"

[sns]
enabled = false
topic_arn = ""

[websocket]
host = "0.0.0.0"
port = 8081

[models]
crypto_dir = "./models/crypto"
equity_dir = "./models/equity"

[venues.hyperliquid]
enabled = true
rate_limit_per_sec = 10

[venues.binance]
enabled = false
rate_limit_per_sec = 5

[venues.ibkr]
enabled = false
gateway_host = "127.0.0.1"
gateway_port = 4001
